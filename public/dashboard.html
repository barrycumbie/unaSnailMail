<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Mailroom Dashboard</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <h1>Mailroom Dashboard</h1>
</header>

<main>

<h2>Packages</h2>

<table>
    <thead>
        <tr>
            <th>Recipient</th>
            <th>Tracking #</th>
            <th>Carrier</th>
            <th>Status</th>
        </tr>
    </thead>

    <tbody>
        <tr>
            <td>John Smith</td>
            <td>1Z999AA10123456784</td>
            <td>UPS</td>
            <td><span class="status-badge ready">Ready for Pickup</span></td>
        </tr>

        <tr>
            <td>Emily Davis</td>
            <td>9400110200881234567890</td>
            <td>USPS</td>
            <td><span class="status-badge processing">Processing</span></td>
        </tr>

        <tr>
            <td>Michael Lee</td>
            <td>123456789012</td>
            <td>FedEx</td>
            <td><span class="status-badge delivered">Delivered</span></td>
        </tr>
    </tbody>

</table>

</main>

</body>
</html>
